name: Quality

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: frontend-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm exec eslint . --cache

      - name: Oxlint
        run: pnpm exec oxlint .

      - name: Type check
        run: pnpm exec vue-tsc --build

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build-only
        env:
          VITE_API_URL: /api
